version: "2"
run:
  modules-download-mode: readonly
  tests: true
linters:
  enable:
    - bodyclose
    - cyclop
    - dupl
    - gocognit
    - goconst
    - gocritic
    - godot
    - gosec
    - misspell
    - noctx
    - revive
  settings:
    cyclop:
      max-complexity: 15
    dupl:
      threshold: 120
    errcheck:
      exclude-functions:
        - fmt.Print
        - fmt.Println
        - fmt.Printf
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 3
      min-occurrences: 4
    gocritic:
      disabled-checks:
        - hugeParam
        - rangeValCopy
      enabled-tags:
        - diagnostic
        - style
        - performance
    godot:
      scope: declarations
      period: true
    gosec:
      excludes:
        - G115
        - G304
    govet:
      disable:
        - shadow
      enable-all: true
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          disabled: true
        - name: var-naming
          arguments:
            - - ID
              - URL
              - HTTP
              - API
              - SQL
              - JSON
              - RPC
              - IO
        - name: unused-parameter
          disabled: false
        - name: unreachable-code
          disabled: false
        - name: early-return
          disabled: false
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1020
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - cyclop
          - dupl
          - errcheck
          - gocognit
          - goconst
          - gosec
        path: _test\.go$
      - linters:
          - errcheck
          - gocritic
          - revive
        path: ^examples/
      - linters:
          - godot
        path: ^internal/
      - path: (.+)\.go$
        text: 'G103:'
      - path: (.+)\.go$
        text: Error return value of `.*\.Close` is not checked
      - path: (.+)\.go$
        text: Error return value of `.*\.Flush` is not checked
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/SkinnyPeteTheGiraffe/gographgo
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
